name: "Copilot Setup Steps"

# Preinstalls tooling for the GitHub Copilot coding agent environment so it can
# operate backlog tasks through the CLI instead of hand-editing task markdown.
# The job name MUST be exactly `copilot-setup-steps` for Copilot to pick it up.

on:
  workflow_dispatch:
  push:
    paths:
      - .github/workflows/copilot-setup-steps.yml
  pull_request:
    paths:
      - .github/workflows/copilot-setup-steps.yml

permissions: {}

jobs:
  copilot-setup-steps:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout repository
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Setup Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"

      - name: Install Backlog.md CLI
        run: npm install -g backlog.md
