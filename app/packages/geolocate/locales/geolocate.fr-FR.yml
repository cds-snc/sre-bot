geolocate:
  description: "Recupérer la localisation géographique d'une adresse IP en utilisant la base de données MaxMind GeoIP."
  examples.google_dns: "`/sre geolocate 8.8.8.8` - Récupérer la localisation géographique du serveur DNS public de Google."
  examples.cloudflare: "`/sre geolocate 1.1.1.1` - Récupérer la localisation géographique du serveur DNS public de Cloudflare."
  examples.ipv6: "`/sre geolocate 2001:4860:4860::8888` - Récupérer la localisation géographique du serveur DNS public de Google (IPv6)."
  result.header: "\U0001F4CD Emplacement de {ip_address}"
  result.city_label: "Ville"
  result.country_label: "Pays"
  result.country_code_label: "Code du pays"
  result.postal_code_label: "Code postal"
  result.coordinates_label: "Coordonn\u00e9es"
  result.time_zone_label: "Fuseau horaire"
  result.no_data: "Aucune donn\u00e9e de localisation disponible pour cette adresse IP."
  result.not_found: "\u274C Adresse introuvable pour l'IP\u00a0: {ip_address}"
  result.service_error: "\u274C Erreur du service de g\u00e9olocalisation. Veuillez r\u00e9essayer."