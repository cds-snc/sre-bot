geolocate:
  description: "Lookup the geographic location of an IP address using MaxMind GeoIP database."
  examples.google_dns: "`/sre geolocate 8.8.8.8` - Lookup the geographic location of Google's public DNS server."
  examples.cloudflare: "`/sre geolocate 1.1.1.1` - Lookup the geographic location of Cloudflare's public DNS server."
  examples.ipv6: "`/sre geolocate 2001:4860:4860::8888` - Lookup the geographic location of Google's public DNS server (IPv6)."
  result.header: "\U0001F4CD Location for {ip_address}"
  result.city_label: "City"
  result.country_label: "Country"
  result.country_code_label: "Country Code"
  result.postal_code_label: "Postal Code"
  result.coordinates_label: "Coordinates"
  result.time_zone_label: "Time Zone"
  result.no_data: "No location data available for this IP."
  result.not_found: "\u274C Location not found for IP: {ip_address}"
  result.service_error: "\u274C Geolocation service error. Please try again."